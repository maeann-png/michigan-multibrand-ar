<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedFarms · Accounts Receivable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>

  :root {
    /* Medfarms · Michigan — "Lush Forest" green on dark forest */
    --bg: #15241a;
    --bg-elev: #1c2f22;
    --bg-elev-2: #26402f;
    --border: #33543e;
    --border-soft: #213528;
    --text: #eaf6ed;
    --text-dim: #9dc1a9;
    --text-faint: #688a73;
    --accent: #68ba7f;          /* Lush Forest sage — primary accent */
    --accent-dim: #4d9461;
    --accent-deep: #2e6f40;
    --warm: #e0a85a;
    --cool: #8fcba0;
    --rose: #e07594;
    --internal: #cfffdc;        /* mint — internal stores (distinct by lightness) */
    --internal-dim: #5fa67d;

    /* surface + motion system */
    --radius: 10px;
    --radius-sm: 7px;
    --shadow-card: inset 0 1px 0 rgba(234,246,237,0.03), 0 14px 34px -22px rgba(0,0,0,0.85);
    --ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(ellipse 1200px 600px at 80% -10%, rgba(104,186,127,0.05), transparent 60%),
      radial-gradient(ellipse 800px 400px at 0% 100%, rgba(46,111,64,0.06), transparent 60%);
  }

  .font-display { font-family: 'Fraunces', serif; font-variation-settings: "opsz" 144; letter-spacing: -0.02em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .tabular { font-variant-numeric: tabular-nums; }

  .app { max-width: 1600px; margin: 0 auto; padding: 32px 40px 80px; }

  /* Top bar */
  .topbar {
    display: flex; align-items: flex-end; justify-content: space-between;
    padding-bottom: 26px;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 0; position: relative;
  }
  .topbar::after {
    content: ''; position: absolute; left: 0; bottom: -1px; width: 168px; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .brand-mark { display: flex; align-items: center; gap: 20px; }
  .brand-name {
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 40px;
    letter-spacing: -0.025em; color: var(--text); line-height: 1;
  }
  .brand-name em { color: var(--accent); font-style: italic; font-weight: 400; }
  .brand-tag {
    margin-top: 9px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.22em; color: var(--text-faint);
  }
  .topbar-meta {
    display: flex; gap: 18px; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
  }
  .topbar-meta strong { color: var(--text); font-weight: 500; }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* Brand tabs */
  .tabbar {
    display: flex; gap: 6px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    margin-bottom: 34px;
    padding-top: 8px;
  }
  .tab {
    background: transparent; border: none; cursor: pointer;
    padding: 18px 26px 16px; position: relative;
    font-family: 'Inter', sans-serif; color: var(--text-dim);
    display: flex; flex-direction: column; gap: 4px; align-items: flex-start;
    transition: color 0.18s var(--ease), background 0.18s var(--ease);
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  }
  .tab:hover { color: var(--text); background: var(--bg-elev); }
  .tab-name { font-family: 'Space Grotesk', sans-serif; font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
  .tab-sub { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-faint); }
  .tab.active { color: var(--text); }
  .tab.active .tab-sub { color: var(--accent); }
  .tab.active::after {
    content: ''; position: absolute; left: 12px; right: 12px; bottom: -1px; height: 3px;
    background: var(--accent); border-radius: 3px;
  }
  .tab.tab-all .tab-name { font-family: 'Space Grotesk', sans-serif; font-style: normal; font-weight: 500; }
  .other-menu {
    position: absolute; top: 100%; left: 0; z-index: 50; min-width: 250px; margin-top: 4px;
    background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 4px;
    padding: 6px; box-shadow: 0 10px 28px rgba(0,0,0,0.55);
    display: flex; flex-direction: column; gap: 2px;
  }
  .other-item {
    display: flex; justify-content: space-between; gap: 18px; align-items: center;
    background: transparent; border: none; cursor: pointer; text-align: left;
    padding: 8px 10px; border-radius: 3px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 13px;
  }
  .other-item:hover { background: var(--bg-elev); }
  .other-item.sel { background: rgba(104,186,127,0.10); color: var(--accent); }
  .other-rev { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint); }

  /* Quick range pills */
  .quick-ranges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .quick-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); margin-right: 4px; }
  .quick-pill { background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 13px; border-radius: 999px; font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer; transition: color 0.18s var(--ease), border-color 0.18s var(--ease), background 0.18s var(--ease); }
  .quick-pill:hover { color: var(--text); border-color: var(--text-dim); }
  .quick-pill.active { background: rgba(104,186,127,0.12); border-color: var(--accent-dim); color: var(--accent); }

  /* Scope cards */
  .scope-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 30px; }
  .scope-card { text-align: left; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; cursor: pointer; display: flex; flex-direction: column; gap: 6px; transition: transform 0.2s var(--ease), border-color 0.2s var(--ease), background 0.2s var(--ease), box-shadow 0.2s var(--ease); }
  .scope-card:hover { border-color: var(--text-dim); background: var(--bg-elev-2); transform: translateY(-2px); }
  .scope-card.active { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
  .scope-card.scope-internal.active { border-color: var(--internal); box-shadow: inset 0 0 0 1px var(--internal); }
  .scope-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-faint); }
  .scope-value { font-family: 'Fraunces', serif; font-size: 30px; line-height: 1.05; color: var(--text); font-variant-numeric: tabular-nums; }
  .scope-card.active .scope-value { color: var(--accent); }
  .scope-card.scope-internal.active .scope-value { color: var(--internal); }
  .scope-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  @media (max-width: 1100px) { .scope-cards { grid-template-columns: 1fr; } }

  /* Filter bar */
  .filters {
    display: flex; gap: 14px; flex-wrap: wrap;
    padding: 16px 20px; background: var(--bg-elev);
    border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 30px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
  .filter-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); }
  .filter-input, .filter-select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; font-family: 'Inter', sans-serif; font-size: 13px;
    border-radius: var(--radius-sm); outline: none; transition: border-color 0.18s var(--ease);
  }
  .filter-input:focus, .filter-select:focus { border-color: var(--accent-dim); }
  .filter-input::placeholder { color: var(--text-faint); }
  .filter-reset {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 8px 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.1em; border-radius: var(--radius-sm); cursor: pointer;
    align-self: flex-end; transition: color 0.18s var(--ease), border-color 0.18s var(--ease);
  }
  .filter-reset:hover { color: var(--text); border-color: var(--text-dim); }

  /* KPI grid */
  .kpi-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--border); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 24px;
    box-shadow: var(--shadow-card);
  }
  .kpi { background: var(--bg-elev); padding: 22px 22px; display: flex; flex-direction: column; gap: 6px; position: relative; transition: background 0.25s var(--ease); }
  .kpi:hover { background: var(--bg-elev-2); }
  .kpi-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-faint); }
  .kpi-value { font-family: 'Fraunces', serif; font-weight: 400; font-size: 33px; line-height: 1.1; letter-spacing: -0.025em; color: var(--text); font-variant-numeric: tabular-nums; }
  .kpi-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .kpi-accent .kpi-value { color: var(--accent); }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; width: 24px; height: 2px; background: var(--accent); opacity: 0; transition: opacity 0.25s var(--ease), width 0.35s var(--ease); }
  .kpi:hover::before { opacity: 1; width: 56px; }
  .kpi-accent::before { opacity: 1; width: 100%; }
  .kpi-accent:hover::before { width: 100%; }

  .section { margin-bottom: 34px; }
  .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px; letter-spacing: -0.01em; }
  .section-title em { color: var(--text-dim); font-style: italic; font-weight: 400; }
  .section-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; }

  .card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-card); }

  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
  .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  /* Rank list */
  .rank-list { display: flex; flex-direction: column; }
  .rank-row { display: grid; grid-template-columns: 24px 1fr auto; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border-soft); position: relative; }
  .rank-row:last-child { border-bottom: none; }
  .rank-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .rank-name { font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rank-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; font-weight: 500; }
  .rank-bar { position: absolute; bottom: 0; left: 38px; right: 0; height: 1px; background: var(--accent-dim); opacity: 0.4; }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); font-weight: 500; background: var(--bg-elev-2); position: sticky; top: 0; }
  .data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); color: var(--text); }
  .data-table tr:hover td { background: rgba(104,186,127,0.03); }
  .data-table .num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; text-align: right; }
  .data-table .dim { color: var(--text-dim); }

  /* Internal stores section wrapper */
  .internal-zone {
    border: 1px solid var(--internal-dim);
    border-left: 3px solid var(--internal);
    border-radius: 4px;
    padding: 26px 26px 30px;
    margin-bottom: 34px;
    background: linear-gradient(180deg, rgba(207,255,220,0.05), transparent 220px);
  }
  .internal-zone .kpi-accent .kpi-value { color: var(--internal); }
  .internal-zone .kpi::before { background: var(--internal); }
  .internal-badge {
    display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.14em; color: var(--internal);
    border: 1px solid var(--internal-dim); border-radius: 2px; padding: 3px 9px; margin-bottom: 6px;
  }

  /* Current-inventory zone — allocated, accent-marked block */
  .inv-zone {
    border: 1px solid var(--accent-dim);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 26px 26px 30px;
    background: linear-gradient(180deg, rgba(104,186,127,0.05), transparent 220px);
  }
  .inv-badge {
    display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent);
    border: 1px solid var(--accent-dim); border-radius: 2px; padding: 3px 9px;
    margin-right: 12px; vertical-align: middle;
  }

  /* Status pill */
  .pill { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 2px; border: 1px solid; }
  .pill-completed { color: var(--accent); border-color: var(--accent-dim); background: rgba(104,186,127,0.06); }
  .pill-pending { color: var(--warm); border-color: var(--warm); background: rgba(224,168,90,0.06); }
  .pill-overdue { color: var(--rose); border-color: var(--rose); background: rgba(224,117,148,0.06); }

  .empty { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .empty h2 { font-family: 'Fraunces', serif; font-weight: 400; font-style: italic; font-size: 28px; margin-bottom: 12px; color: var(--text); }
  .empty code { display: inline-block; background: var(--bg-elev); border: 1px solid var(--border); padding: 4px 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; border-radius: 2px; color: var(--accent); margin: 0 2px; }

  @media (max-width: 1100px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-half { grid-template-columns: 1fr; }
  }

  /* Keyboard focus — visible ring on every interactive control */
  .tab:focus-visible, .quick-pill:focus-visible, .scope-card:focus-visible,
  .filter-reset:focus-visible, .other-item:focus-visible,
  .filter-input:focus-visible, .filter-select:focus-visible {
    outline: none; box-shadow: var(--ring);
  }

  /* Respect reduced-motion preference */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important; scroll-behavior: auto !important;
    }
    .scope-card:hover { transform: none; }
  }
/* --- suite additions (scope toggle, segmented control, bottom nav, chips) --- */
.scope-row { display:flex; gap:8px; margin-bottom:20px; }
.scope-btn { font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.06em; text-transform:uppercase;
  padding:9px 18px; background:var(--bg-elev); color:var(--text-dim); border:1px solid var(--border);
  border-radius:var(--radius-sm); cursor:pointer; transition:all .15s var(--ease); }
.scope-btn:hover { color:var(--text); border-color:var(--accent-dim); }
.scope-active { background:var(--accent-deep); color:var(--text); border-color:var(--accent); }
.seg { display:flex; gap:4px; }
.seg-btn { font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
  padding:5px 12px; background:var(--bg-elev); color:var(--text-dim); border:1px solid var(--border);
  border-radius:var(--radius-sm); cursor:pointer; transition:all .15s var(--ease); }
.seg-btn:hover { color:var(--text); }
.seg-active { background:var(--accent-deep); color:var(--text); border-color:var(--accent); }
.filter-reset-lg { padding:12px 28px; font-size:13px; align-self:flex-end; margin-left:auto; }
.chip { display:inline-block; font-family:'JetBrains Mono',monospace; font-size:9px; text-transform:uppercase;
  letter-spacing:.06em; padding:2px 7px; margin:1px 3px 1px 0; border:1px solid; border-radius:4px; opacity:.9; }
.table-foot { padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-faint);
  text-align:center; border-top:1px solid var(--border); }
.bottom-nav { position:fixed; left:0; right:0; bottom:0; z-index:50; display:flex; justify-content:center; gap:6px;
  padding:10px; background:rgba(21,36,26,0.92); backdrop-filter:blur(10px); border-top:1px solid var(--border); }
.bn-tab { font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:13px; letter-spacing:.01em;
  padding:9px 22px; color:var(--text-dim); text-decoration:none; border-radius:var(--radius-sm);
  border:1px solid transparent; transition:all .15s var(--ease); }
.bn-tab:hover { color:var(--text); background:var(--bg-elev); }
.bn-active { color:var(--text); background:var(--accent-deep); border-color:var(--accent); }
.aging-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:var(--border);
  border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:36px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
/* =====================================================================
   SHARED FOUNDATION  ·  MedFarms multi-dashboard suite
   Helpers, business logic, data loading, and common UI components.
   This block is identical across the Sales / AR / Inventory / Rep
   dashboards so they stay perfectly consistent.
   ===================================================================== */
const { useState, useEffect, useMemo, useRef } = React;

/* ---- Recharts CDN guard --------------------------------------------- */
if (typeof Recharts === 'undefined') {
  document.getElementById('root').innerHTML =
    '<div style="max-width:560px;margin:80px auto;padding:28px;background:#1c2f22;border:1px solid #33543e;border-radius:10px;color:#eaf6ed;font-family:sans-serif">' +
    '<h2 style="font-family:Fraunces,serif;font-style:italic;font-weight:400;margin-bottom:10px">Charts library didn\u2019t load</h2>' +
    '<p style="color:#9dc1a9;line-height:1.6">Recharts failed to load from the CDN \u2014 usually an ad-blocker or offline/firewall. Disable blockers for this page, or refresh.</p></div>';
  throw new Error('Recharts failed to load');
}
const {
  ResponsiveContainer, LineChart, Line, BarChart, Bar, AreaChart, Area,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, PieChart, Pie, Cell
} = Recharts;

/* ---- Number / date helpers ------------------------------------------ */
const parseMoney = (str) => {
  if (str == null) return 0;
  if (typeof str === 'number') return str;
  let s = String(str).replace(/[$,\s]/g, '');
  if (/^\(.*\)$/.test(s)) s = '-' + s.slice(1, -1);
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
};
const fmtMoney = (n) => {
  if (n == null || isNaN(n)) return '\u2014';
  const a = Math.abs(n);
  if (a >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (a >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toLocaleString(undefined, { maximumFractionDigits: 0 });
};
const fmtMoneyFull = (n) => '$' + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtNum = (n) => (Math.round(n) || 0).toLocaleString();
const fmtPct = (n) => (n == null || isNaN(n) ? '\u2014' : (n >= 0 ? '' : '') + n.toFixed(1) + '%');

const parseDate = (str) => {
  if (!str) return null;
  const s = String(str).trim();
  const ymdM = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (ymdM) return new Date(+ymdM[1], +ymdM[2] - 1, +ymdM[3]);
  const mdyM = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (mdyM) return new Date(+mdyM[3], +mdyM[1] - 1, +mdyM[2]);
  const d = new Date(s);
  return isNaN(d) ? null : d;
};
const ymd = (d) => {
  if (!(d instanceof Date) || isNaN(d)) return '';
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
};
const daysBetween = (a, b) => Math.floor((a.getTime() - b.getTime()) / 86400000);

/* ---- Business logic (mirrors the live MedFarms dashboard) ----------- */
const PRIMARY_BRANDS = ["Hyman", "Chill Medicated", "Value Pak Distro", "100 Shafer", "Homiez", "Covert Cups"];
const OTHER_ALIASES = { "Brand 2402": "Mitten Extracts", "Brand 2994": "Hashish Boyz", "Brand 2993": "LayerCakeFarms" };
const EXCLUDE_ACCOUNTS = ["Chill CBD Ecommerce", "Dispo Ace Production", "GNO"]; // EXACT match only
const INTERNAL_STORES = ["Dispo - Bay City North", "Dispo - Bay City South", "Dispo - Battle Creek (Fire Creek)", "Dispo - Hazel Park", "Dispo - Romeo", "Dispo - Whitmore Lake"];
const EXCLUDED_STATUS = { combined: 1, draft: 1, cancelled: 1, rejected: 1 };

// Brand colors. NOTE: placeholders matching the client's requested hues
// (Hyman=orange, Chill=blue, Covert=electric yellow, Homiez=hot pink,
// Value Pak=light). Swap these exact hex values once Towbey sends the brand sheet.
const BRAND_COLORS = {
  "Hyman": "#e0a85a",
  "Chill Medicated": "#5aa9e0",
  "Covert Cups": "#e8e54a",
  "Homiez": "#e07594",
  "Value Pak Distro": "#cfe8d6",
  "100 Shafer": "#68ba7f",
  "Other Brands": "#8fcba0",
};
const brandColor = (b) => BRAND_COLORS[b] || "#8fcba0";
const SERIES_COLORS = ["#68ba7f", "#5aa9e0", "#e0a85a", "#e07594", "#e8e54a", "#8fcba0", "#cfe8d6", "#4d9461"];

const isPrimaryName = (b) => PRIMARY_BRANDS.includes((b || "").trim());
const otherName = (raw) => { const b = (raw || "").trim(); return OTHER_ALIASES[b] || b || "(unlabeled)"; };
const classifyAccount = (buyerName) => {
  const n = String(buyerName || '').trim().toLowerCase();
  if (!n) return 'wholesale';
  for (const e of EXCLUDE_ACCOUNTS) if (n === e.toLowerCase()) return 'excluded';
  for (const s of INTERNAL_STORES) if (n.startsWith(s.toLowerCase())) return 'internal';
  return 'wholesale';
};

// Per-order brand set (across ALL rows of the order) -> "contains" semantics.
const buildOrderBrands = (rows) => {
  const ob = {};
  for (const r of rows) {
    const id = r.order_uid || r.order_number || '';
    if (!id) continue;
    (ob[id] || (ob[id] = new Set()));
    String(r.brand || '').split(',').map(s => s.trim()).filter(Boolean)
      .forEach(t => ob[id].add(isPrimaryName(t) ? t : otherName(t)));
  }
  return ob;
};

// Normalize rows into the working shape every sales-style dashboard uses.
const normalizeRows = (rows) => {
  const ob = buildOrderBrands(rows);
  return rows.map(r => {
    const id = r.order_uid || r.order_number || '';
    const bset = ob[id] ? [...ob[id]] : [];
    const prims = bset.filter(isPrimaryName);
    return {
      ...r,
      _id: id,
      _date: parseDate(r.order_date),
      _delivery: parseDate(r.delivery_date),
      _revenue: parseMoney(r.revenue),
      _gross: parseMoney(r.gross),
      _discount: parseMoney(r.discount),
      _qty: parseFloat(r.quantity) || 0,
      _units: parseFloat(r.units_sold) || 0,
      _rep: (r.sales_rep && String(r.sales_rep).trim()) ? String(r.sales_rep).trim() : 'Unassigned',
      _term: (r.payment_term && String(r.payment_term).trim()) ? String(r.payment_term).trim() : '\u2014',
      _bucket: classifyAccount(r.buyer_name),
      _brands: bset,
      _primaries: prims,
      _hasOther: bset.some(b => !isPrimaryName(b)),
      _excludedStatus: !!EXCLUDED_STATUS[String(r.order_status || '').trim().toLowerCase()],
    };
  });
};

/* ---- Data loader (gz via pako, plain-json fallback) ----------------- */
function useData(file) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  useEffect(() => {
    const load = () => {
      fetch((file || 'sales_data.json.gz') + '?t=' + Date.now())
        .then(r => { if (!r.ok) throw new Error('Could not load ' + (file || 'sales_data.json.gz') + ' (HTTP ' + r.status + ')'); return r.arrayBuffer(); })
        .then(buf => {
          const bytes = new Uint8Array(buf);
          let text;
          if (bytes[0] === 0x1f && bytes[1] === 0x8b) text = pako.ungzip(bytes, { to: 'string' });
          else text = new TextDecoder().decode(bytes);
          setData(JSON.parse(text));
        })
        .catch(e => setError(e.message));
    };
    load();
    const id = setInterval(load, 60000);
    return () => clearInterval(id);
  }, [file]);
  return { data, error };
}

/* ---- Common UI components ------------------------------------------- */
function Topbar({ title, subtitle, fetchedAt, right }) {
  const ago = fetchedAt ? Math.floor((Date.now() - fetchedAt.getTime()) / 60000) : null;
  return (
    <div className="topbar">
      <div className="brand-mark" style={{ alignItems: 'center', gap: 14 }}>
        <img src="logo.png" alt="MedFarms" style={{ height: 44, width: 'auto', flexShrink: 0 }}
             onError={(e) => { e.target.style.display = 'none'; }} />
        <div>
          <h1 className="brand-name" style={{ lineHeight: 1, fontSize: 25 }}>
            {title} <em style={{ color: 'var(--text-dim)', fontStyle: 'italic', fontWeight: 400 }}>{subtitle}</em>
          </h1>
          <div className="brand-tag" style={{ marginTop: 4, border: 'none', padding: 0, fontSize: 9 }}>
            Michigan \u00b7 Medfarms Intelligence
          </div>
        </div>
      </div>
      <div className="topbar-meta">
        {right}
        {ago != null && <span>Updated {ago < 1 ? 'just now' : ago + 'm ago'}</span>}
        <span className="pulse"></span>
      </div>
    </div>
  );
}

function Kpi({ label, value, sub, accent, color }) {
  return (
    <div className={'kpi' + (accent ? ' kpi-accent' : '')}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value tabular" style={color ? { color } : null}>{value}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

function SectionHeader({ title, em, meta }) {
  return (
    <div className="section-header">
      <h2 className="section-title">{title} {em && <em>{em}</em>}</h2>
      {meta && <span className="section-meta">{meta}</span>}
    </div>
  );
}

function RankList({ data, colorByName }) {
  const max = Math.max(...data.map(d => d.value), 1);
  return (
    <div className="rank-list">
      {data.length === 0 && <div style={{ padding: 20, color: 'var(--text-faint)', textAlign: 'center', fontSize: 13 }}>No data</div>}
      {data.map((d, i) => (
        <div key={i} className="rank-row">
          <div className="rank-num">{String(i + 1).padStart(2, '0')}</div>
          <div className="rank-name" title={d.name}>
            {colorByName && <span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 2, background: brandColor(d.name), marginRight: 8 }}></span>}
            {d.name}
          </div>
          <div className="rank-value">{d.display || fmtMoneyFull(d.value)}</div>
          <div className="rank-bar" style={{ width: 'calc(' + (d.value / max * 100).toFixed(1) + '% - 80px)' }}></div>
        </div>
      ))}
    </div>
  );
}

function StatusPill({ status }) {
  if (!status) return <span className="dim">\u2014</span>;
  const s = status.toLowerCase();
  const cls = s.includes('paid') && !s.includes('un') ? 'pill-completed'
    : s.includes('overdue') ? 'pill-overdue' : 'pill-pending';
  return <span className={'pill ' + cls}>{status}</span>;
}

function Empty({ title, children }) {
  return <div className="empty"><h2>{title}</h2>{children}</div>;
}
/* =====================================================================
   ACCOUNTS RECEIVABLE DASHBOARD
   Outstanding balances aged from invoice date + payment term.
   Aging definition is a sensible default — confirm rules with client.
   ===================================================================== */
const NAV = [
  { key: 'sales',     label: 'Sales',        href: '../sales/index.html' },
  { key: 'ar',        label: 'Receivables',  href: 'index.html' },
  { key: 'inventory', label: 'Inventory',    href: '../inventory/index.html' },
  { key: 'rep',       label: 'By Rep',       href: '../rep/index.html' },
];
const ACTIVE = 'ar';
function BottomNav() {
  return <nav className="bottom-nav">{NAV.map(n => <a key={n.key} href={n.href} className={'bn-tab' + (n.key === ACTIVE ? ' bn-active' : '')}>{n.label}</a>)}</nav>;
}

// Aging buckets + colors (client spec: Current=green, 31-60=yellow, 61-90=orange, 91+=red)
const BUCKETS = [
  { key: 'current', label: 'Current', color: '#68ba7f', test: (d) => d <= 30 },
  { key: 'b31',     label: '31\u201360 days', color: '#e8e54a', test: (d) => d > 30 && d <= 60 },
  { key: 'b61',     label: '61\u201390 days', color: '#e0a85a', test: (d) => d > 60 && d <= 90 },
  { key: 'b91',     label: '91+ days', color: '#e07594', test: (d) => d > 90 },
];
const bucketOf = (days) => (BUCKETS.find(b => b.test(days)) || BUCKETS[0]);
const termDays = (term) => {
  const t = String(term || '').trim().toLowerCase();
  const m = t.match(/net\s*(\d+)/);
  if (m) return +m[1];
  return 0; // COD, blank, Consignment, LeafLink Financial -> due on invoice date
};

function App() {
  const { data, error } = useData('sales_data.json.gz');
  const [filters, setFilters] = useState({ rep: '', buyer: '', brand: '', bucket: '', search: '' });
  if (error) return <div className="app"><Empty title="No data yet"><p>Run the scraper to produce <code>sales_data.json.gz</code>.</p><p style={{ marginTop: 10, fontSize: 12, color: 'var(--text-faint)' }}>{error}</p></Empty></div>;
  if (!data) return <div className="app"><Empty title="Loading\u2026" /></div>;
  return <ARDashboard data={data} filters={filters} setFilters={setFilters} />;
}

function ARDashboard({ data, filters, setFilters }) {
  const rows = data.rows || [];
  const normalized = useMemo(() => normalizeRows(rows), [rows]);
  const asOf = useMemo(() => parseDate(data.fetched_at) || new Date(), [data]);

  // Build one record per UNPAID order (dedupe by order id), aged.
  const invoices = useMemo(() => {
    const m = {};
    normalized.forEach(r => {
      if (r._bucket === 'excluded' || r._excludedStatus) return;
      if (r.paid === true) return;                 // only outstanding
      const id = r._id; if (!id) return;
      if (!m[id]) {
        const due = r._date ? new Date(r._date.getTime() + termDays(r.payment_term) * 86400000) : null;
        const days = due ? daysBetween(asOf, due) : 0;
        m[id] = {
          id, invoice: r.order_number || id, buyer: r.buyer_name || '\u2014', rep: r._rep,
          state: r.buyer_state || '\u2014', date: r._date ? ymd(r._date) : '\u2014',
          due: due ? ymd(due) : '\u2014', days, term: r._term, status: r.payment_status || 'Unpaid',
          brands: new Set(), outstanding: 0,
        };
      }
      r._primaries.forEach(b => m[id].brands.add(b)); if (r._hasOther) m[id].brands.add('Other Brands');
      m[id].outstanding += r._revenue;
    });
    return Object.values(m).map(o => ({ ...o, brands: [...o.brands], bucket: bucketOf(o.days) }));
  }, [normalized, asOf]);

  const distinct = useMemo(() => ({
    reps: [...new Set(invoices.map(o => o.rep).filter(Boolean))].sort(),
    buyers: [...new Set(invoices.map(o => o.buyer).filter(Boolean))].sort(),
    brands: PRIMARY_BRANDS.filter(b => invoices.some(o => o.brands.includes(b))),
  }), [invoices]);

  const filtered = useMemo(() => invoices.filter(o => {
    if (filters.rep && o.rep !== filters.rep) return false;
    if (filters.buyer && o.buyer !== filters.buyer) return false;
    if (filters.brand && !o.brands.includes(filters.brand)) return false;
    if (filters.bucket && o.bucket.key !== filters.bucket) return false;
    if (filters.search) { const q = filters.search.toLowerCase(); if (!((o.invoice + ' ' + o.buyer + ' ' + o.rep).toLowerCase().includes(q))) return false; }
    return true;
  }), [invoices, filters]);

  const totals = useMemo(() => {
    const t = { total: 0, count: filtered.length };
    BUCKETS.forEach(b => t[b.key] = 0);
    filtered.forEach(o => { t.total += o.outstanding; t[o.bucket.key] += o.outstanding; });
    return t;
  }, [filtered]);

  const byRep = useMemo(() => {
    const m = {};
    filtered.forEach(o => {
      if (!m[o.rep]) { m[o.rep] = { name: o.rep, total: 0 }; BUCKETS.forEach(b => m[o.rep][b.key] = 0); }
      m[o.rep].total += o.outstanding; m[o.rep][o.bucket.key] += o.outstanding;
    });
    return Object.values(m).sort((a, b) => b.total - a.total);
  }, [filtered]);

  const byBuyer = useMemo(() => {
    const m = {};
    filtered.forEach(o => { if (!m[o.buyer]) m[o.buyer] = { name: o.buyer, value: 0 }; m[o.buyer].value += o.outstanding; });
    return Object.values(m).sort((a, b) => b.value - a.value).slice(0, 12);
  }, [filtered]);

  const agingPie = BUCKETS.map(b => ({ name: b.label, value: totals[b.key], color: b.color })).filter(d => d.value > 0);
  const sorted = useMemo(() => filtered.slice().sort((a, b) => b.days - a.days), [filtered]);

  const reset = () => setFilters({ rep: '', buyer: '', brand: '', bucket: '', search: '' });
  const upd = (k, v) => setFilters(f => ({ ...f, [k]: v }));

  return (
    <div className="app" style={{ paddingBottom: 110 }}>
      <Topbar title="Accounts" subtitle="receivable" fetchedAt={asOf}
        right={<span><strong>{fmtNum(totals.count)}</strong> open invoices</span>} />

      <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'var(--text-dim)', marginBottom: 18 }}>
        Aged as of {ymd(asOf)} \u00b7 due date = invoice date + payment term \u00b7 outstanding = net of unpaid orders
      </div>

      {/* Filters */}
      <div className="filters">
        <div className="filter-group"><label className="filter-label">Sales Rep</label><select className="filter-select" value={filters.rep} onChange={e => upd('rep', e.target.value)}><option value="">All</option>{distinct.reps.map(b => <option key={b}>{b}</option>)}</select></div>
        <div className="filter-group"><label className="filter-label">Buyer</label><select className="filter-select" value={filters.buyer} onChange={e => upd('buyer', e.target.value)}><option value="">All</option>{distinct.buyers.map(b => <option key={b}>{b}</option>)}</select></div>
        <div className="filter-group"><label className="filter-label">Brand</label><select className="filter-select" value={filters.brand} onChange={e => upd('brand', e.target.value)}><option value="">All</option>{distinct.brands.map(b => <option key={b}>{b}</option>)}</select></div>
        <div className="filter-group"><label className="filter-label">Aging</label><select className="filter-select" value={filters.bucket} onChange={e => upd('bucket', e.target.value)}><option value="">All</option>{BUCKETS.map(b => <option key={b.key} value={b.key}>{b.label}</option>)}</select></div>
        <div className="filter-group" style={{ minWidth: 180 }}><label className="filter-label">Search</label><input type="text" className="filter-input" placeholder="invoice / buyer / rep\u2026" value={filters.search} onChange={e => upd('search', e.target.value)} /></div>
        <button className="filter-reset filter-reset-lg" onClick={reset}>Reset</button>
      </div>

      {/* Total + aging buckets */}
      <div className="aging-grid">
        <Kpi label="Total Outstanding" value={fmtMoney(totals.total)} sub={fmtNum(totals.count) + ' invoices'} accent />
        {BUCKETS.map(b => (
          <Kpi key={b.key} label={b.label} value={fmtMoney(totals[b.key])} color={b.color}
            sub={totals.total ? (totals[b.key] / totals.total * 100).toFixed(1) + '% of AR' : '\u2014'} />
        ))}
      </div>

      {/* Aging mix + top buyers */}
      <section className="section">
        <div className="grid-half">
          <div>
            <SectionHeader title="Aging" em="mix" meta="by bucket" />
            <div className="card" style={{ height: 320, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <ResponsiveContainer width="100%" height="100%">
                <PieChart>
                  <Pie data={agingPie} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={62} outerRadius={110} paddingAngle={2} stroke="var(--bg)" strokeWidth={2}>
                    {agingPie.map((d, i) => <Cell key={i} fill={d.color} />)}
                  </Pie>
                  <Tooltip contentStyle={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8, fontSize: 12 }} formatter={(v) => fmtMoneyFull(v)} />
                  <Legend verticalAlign="bottom" iconType="square" wrapperStyle={{ fontSize: 11, fontFamily: 'JetBrains Mono', color: 'var(--text-dim)' }} />
                </PieChart>
              </ResponsiveContainer>
            </div>
          </div>
          <div>
            <SectionHeader title="Top" em="balances" meta="by buyer" />
            <div className="card"><RankList data={byBuyer} /></div>
          </div>
        </div>
      </section>

      {/* By rep (stacked aging) */}
      <section className="section">
        <SectionHeader title="Outstanding" em="by rep" meta={byRep.length + ' reps'} />
        <div className="card" style={{ height: 340 }}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={byRep} layout="vertical" margin={{ top: 8, right: 16, left: 8, bottom: 8 }}>
              <CartesianGrid stroke="var(--border-soft)" strokeDasharray="2 2" horizontal={false} />
              <XAxis type="number" stroke="var(--text-faint)" tick={{ fontSize: 11, fontFamily: 'JetBrains Mono' }} tickFormatter={fmtMoney} axisLine={false} tickLine={false} />
              <YAxis type="category" dataKey="name" stroke="var(--text-faint)" tick={{ fontSize: 11 }} width={130} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8, fontSize: 12 }} formatter={(v, n) => [fmtMoneyFull(v), n]} />
              <Legend wrapperStyle={{ fontSize: 11, fontFamily: 'JetBrains Mono' }} />
              {BUCKETS.map(b => <Bar key={b.key} dataKey={b.key} name={b.label} stackId="a" fill={b.color} radius={[0, 2, 2, 0]} />)}
            </BarChart>
          </ResponsiveContainer>
        </div>
      </section>

      {/* Aging detail table */}
      <section className="section">
        <SectionHeader title="Open" em="invoices" meta={fmtNum(filtered.length) + ' invoices · oldest first'} />
        <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
          <div style={{ overflowX: 'auto', maxHeight: 520 }}>
            <table className="data-table">
              <thead><tr><th>Invoice #</th><th>Buyer</th><th>Rep</th><th>Brands</th><th>Invoice</th><th>Due</th><th className="num">Days Past</th><th>Aging</th><th className="num">Outstanding</th></tr></thead>
              <tbody>
                {sorted.slice(0, 200).map((o, i) => (
                  <tr key={i}>
                    <td className="font-mono" style={{ color: 'var(--accent)' }}>{o.invoice}</td>
                    <td>{o.buyer}</td><td className="dim">{o.rep}</td>
                    <td>{o.brands.map((b, j) => <span key={j} className="chip" style={{ color: brandColor(b), borderColor: brandColor(b) }}>{b}</span>)}</td>
                    <td className="dim font-mono">{o.date}</td><td className="dim font-mono">{o.due}</td>
                    <td className="num" style={{ color: o.bucket.color }}>{o.days}</td>
                    <td><span className="pill" style={{ color: o.bucket.color, borderColor: o.bucket.color }}>{o.bucket.label}</span></td>
                    <td className="num"><strong>{fmtMoneyFull(o.outstanding)}</strong></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {filtered.length > 200 && <div className="table-foot">Showing 200 of {fmtNum(filtered.length)} \u00b7 use filters to narrow</div>}
        </div>
      </section>

      <BottomNav />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
